services:
  v6y-database:
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PSQL_DB_USER}
      - POSTGRES_PASSWORD=${PSQL_DB_PASSWORD}
      - POSTGRES_DB=${PSQL_DB_NAME}
    ports:
      - "${PSQL_DB_PORT}:5432"
    volumes:
      - v6y-database-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PSQL_DB_USER} -d ${PSQL_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  v6y-migrate:
    image: ${REGISTRY}v6y-migrate:${IMAGE_TAG}
    pull_policy: build
    build:
      context: .
      dockerfile: v6y-config/Dockerfile.migrations
    environment:
      - PSQL_DB_HOST=${PSQL_DB_HOST}
      - PSQL_DB_NAME=${PSQL_DB_NAME}
      - PSQL_DB_USER=${PSQL_DB_USER}
      - PSQL_DB_PASSWORD=${PSQL_DB_PASSWORD}
      - PSQL_DB_PORT=${PSQL_DB_PORT}
    depends_on:
      v6y-database:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./:/app
      - mono-node-modules:/app/node_modules

  v6y-bff:
    image: ${REGISTRY}v6y-bff:${IMAGE_TAG}
    pull_policy: build
    extends:
      file: docker-compose.base.yml
      service: v6y-service-base
    command: pnpm run start:bff
    ports:
      - "4001:4001"
    environment:
      - PSQL_DB_HOST=${PSQL_DB_HOST}
      - PSQL_DB_NAME=${PSQL_DB_NAME}
      - PSQL_DB_USER=${PSQL_DB_USER}
      - PSQL_DB_PASSWORD=${PSQL_DB_PASSWORD}
      - PSQL_DB_PORT=${PSQL_DB_PORT}
      - GITLAB_PRIVATE_TOKEN=${GITLAB_PRIVATE_TOKEN}
      - GITHUB_PRIVATE_TOKEN=${GITHUB_PRIVATE_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - V6Y_BFF_API_PATH=${V6Y_BFF_API_PATH}
      - V6Y_BFF_API_PORT=${V6Y_BFF_API_PORT}
    depends_on:
      v6y-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  v6y-bfb-main-analyzer:
    image: ${REGISTRY}v6y-bfb-main-analyzer:${IMAGE_TAG}
    pull_policy: build
    extends:
      file: docker-compose.base.yml
      service: v6y-service-base
    command: pnpm run start:bfb:main
    ports:
      - "4002:4002"
    environment:
      - PSQL_DB_HOST=${PSQL_DB_HOST}
      - PSQL_DB_NAME=${PSQL_DB_NAME}
      - PSQL_DB_USER=${PSQL_DB_USER}
      - PSQL_DB_PASSWORD=${PSQL_DB_PASSWORD}
      - PSQL_DB_PORT=${PSQL_DB_PORT}
      - GITLAB_PRIVATE_TOKEN=${GITLAB_PRIVATE_TOKEN}
      - GITHUB_PRIVATE_TOKEN=${GITHUB_PRIVATE_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - V6Y_MAIN_API_PATH=${V6Y_MAIN_API_PATH}
      - V6Y_MAIN_API_PORT=${V6Y_MAIN_API_PORT}
      - V6Y_STATIC_ANALYZER_API_PATH=${V6Y_STATIC_ANALYZER_API_PATH}
      - V6Y_DYNAMIC_ANALYZER_API_PATH=${V6Y_DYNAMIC_ANALYZER_API_PATH}
    depends_on:
      v6y-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  v6y-bfb-static-code-auditor:
