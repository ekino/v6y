      retries: 3

  v6y-frontend-bo:
    image: ${REGISTRY}v6y-frontend-bo:${IMAGE_TAG}
    pull_policy: build
    extends:
      file: docker-compose.base.yml
      service: v6y-service-base
    command: pnpm run start:frontend:bo
    ports:
      - "4008:4008"
    environment:
      - NEXT_PUBLIC_V6Y_BFF_PATH=${NEXT_PUBLIC_V6Y_BFF_PATH}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4008/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mono-node-modules: null
  v6y-database-data: null
